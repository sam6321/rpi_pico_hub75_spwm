name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  PICO_SDK_VERSION: "2.2.0"
  ARM_TOOLCHAIN_VERSION: "14.2.Rel1"
  BUILD_TYPE: Release

jobs:
  build:
    name: Build CPU and PIO firmwares
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Checkout Pico SDK
        uses: actions/checkout@v7
        with:
          repository: raspberrypi/pico-sdk
          ref: ${{ env.PICO_SDK_VERSION }}
          path: pico-sdk
          submodules: true

      - name: Install Arm GNU Toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: ${{ env.ARM_TOOLCHAIN_VERSION }}

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DPICO_SDK_PATH=${{ github.workspace }}/pico-sdk \
            -DPICO_BOARD=pico

      - name: Build firmwares
        run: cmake --build build --target pico_dp3364_pio pico_dp3364_cpu -j$(nproc)

      - name: Upload UF2 artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pico_dp3364_pio.uf2
          path: |
            build/pico_dp3364_pio.uf2
            build/pico_dp3364_cpu.uf2
